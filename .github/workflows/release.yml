name: Release

# Build all three artifacts and publish a draft release.
# Triggers:
#   * pushing a tag matching v*
#   * manual run (workflow_dispatch) with a `tag` input — the tag is created
#     from the current commit and then used exactly as a pushed tag would be.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to create and release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Create the tag from the checked-out commit and push it.
            git tag "$TAG"
            git push origin "$TAG"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config \
            libpulse-dev libudev-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev libssl-dev libfontconfig1-dev libxdo-dev \
            mingw-w64 wixl

      - name: Install Rust (stable + Windows GNU target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Linux binary
        run: cargo build --release

      - name: Build Windows binary (cross)
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package Windows MSI
        run: |
          cp target/x86_64-pc-windows-gnu/release/slidr.exe installer/
          (cd installer && wixl -o Slidr-Setup.msi slidr.wxs)

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/release/slidr                              dist/slidr-linux-x86_64
          cp target/x86_64-pc-windows-gnu/release/slidr.exe    dist/slidr-windows-portable.exe
          cp installer/Slidr-Setup.msi                         dist/Slidr-Setup.msi
          ls -lh dist

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Slidr ${{ steps.tag.outputs.tag }}"
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/slidr-linux-x86_64
            dist/slidr-windows-portable.exe
            dist/Slidr-Setup.msi
